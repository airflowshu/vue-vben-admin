          format: int32
        message:
          type: string
        data:
          type: string
        error:
          type: string
    SysVersionLog:
      type: object
      properties:
        id:
          type: string
          readOnly: true
          title: 主键id
        createTime:
          type: string
          format: date-time
          readOnly: true
          title: 创建时间
        lastModifyTime:
          type: string
          format: date-time
          readOnly: true
          title: 更新时间
        createBy:
          type: string
          readOnly: true
          title: 创建人
        lastModifyBy:
          type: string
          readOnly: true
          title: 更新人
        remark:
          type: string
          title: 备注
        versionNo:
          type: string
          title: 版本号
        releaseDate:
          type: string
          format: date-time
          title: 发布日期
        type:
          type: string
          title: 类型
        typeStr:
          type: string
          title: 类型Str
        title:
          type: string
          title: 标题
        description:
          type: string
          title: 更新描述
        status:
          type: integer
          format: int32
          title: 状态:0-草稿,1-已发布
        features:
          type: array
          items:
            type: string
        fixes:
          type: array
          items:
            type: string
    ApiResultBoolean:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        data:
          type: boolean
        error:
          type: string
    SysDept:
      type: object
      properties:
        id:
          type: string
          readOnly: true
          title: 主键id
        createTime:
          type: string
          format: date-time
          readOnly: true
          title: 创建时间
        lastModifyTime:
          type: string
          format: date-time
          readOnly: true
          title: 更新时间
        createBy:
          type: string
          readOnly: true
          title: 创建人
        lastModifyBy:
          type: string
          readOnly: true
          title: 更新人
        remark:
          type: string
          title: 备注
        deptName:
          type: string
          example: 研发部
          title: 部门名称
        orderNo:
          type: integer
          format: int32
          example: 10
          title: 排序
        status:
          type: integer
          format: int32
          example: 1
          title: 状态值
        statusStr:
          type: string
          readOnly: true
          title: 状态
        parentId:
          type: string
          example: 0
          title: 父级ID
